<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">

  <title>まき家計簿</title>

  <meta name="theme-color" content="#7aa7ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="まき家計簿">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<script>
  const pages = [
    "{{ url_for('home') }}",
    "{{ url_for('input_expense') }}",
    "{{ url_for('savings') }}",
    "{{ url_for('income') }}",
    "{{ url_for('candidates') }}",
    "{{ url_for('compare') }}",
    "{{ url_for('history') }}"
  ];

  let startX = 0;
  let endX = 0;

  document.addEventListener("touchstart", function(e) {
    startX = e.changedTouches[0].screenX;
  });

  document.addEventListener("touchend", function(e) {
    endX = e.changedTouches[0].screenX;

    const diff = endX - startX;

    if (Math.abs(diff) < 80) return;

    const currentPath = window.location.pathname;
    let currentIndex = pages.findIndex(p => p === currentPath);

    if (currentIndex === -1) return;

    // 左スワイプ：次へ
    if (diff < 0 && currentIndex < pages.length - 1) {
      window.location.href = pages[currentIndex + 1];
    }

    // 右スワイプ：前へ
    if (diff > 0 && currentIndex > 0) {
      window.location.href = pages[currentIndex - 1];
    }
  });
</script>

<body>
  <div class="app-shell">

    <header class="top-header">
      <div>
        <div class="app-title">まき家計簿</div>
        <div class="app-subtitle">予定から支出を育てる家計簿</div>
      </div>
      <a class="logout-link" href="{{ url_for('logout') }}">ログアウト</a>
    </header>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-area">
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <nav class="bottom-nav">
      <a class="{% if active == 'home' %}active{% endif %}" href="{{ url_for('home') }}">
        ホーム
      </a>

      <a class="{% if active == 'input' %}active{% endif %}" href="{{ url_for('input_expense') }}">
        入力
      </a>

      <a class="{% if active == 'savings' %}active{% endif %}" href="{{ url_for('savings') }}">
        貯金
      </a>

      <a class="{% if active == 'income' %}active{% endif %}" href="{{ url_for('income') }}">
        収入
      </a>

      <a class="{% if active == 'candidates' %}active{% endif %}" href="{{ url_for('candidates') }}">
        予定
      </a>

      <a class="{% if active == 'compare' %}active{% endif %}" href="{{ url_for('compare') }}">
        比較
      </a>

      <a class="{% if active == 'history' %}active{% endif %}" href="{{ url_for('history') }}">
        履歴
      </a>
    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>

  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/service-worker.js");
      });
    }
  </script>
  <script>
 if ("serviceWorker" in navigator) {
   navigator.serviceWorker.register("/service-worker.js");
 }
 </script>
</body>
</html>
