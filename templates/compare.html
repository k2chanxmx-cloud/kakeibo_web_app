{% extends "base.html" %}

{% block content %}

<section class="big-card">
  <h1>月別比較</h1>

  <form method="get" class="form">
    <label>カテゴリ</label>
    <select class="input" name="category">
      {% for c in categories %}
        <option value="{{ c }}" {% if c == selected_category %}selected{% endif %}>
          {{ c }}
        </option>
      {% endfor %}
    </select>

    <button class="primary-btn">表示する</button>
  </form>
</section>

<section class="card">
  <h2>{{ selected_category }} の推移</h2>
  <canvas id="categoryChart"></canvas>
</section>

<section class="card">
  <h2>遊び費の推移</h2>
  <p class="mini">コンカフェ＋同伴＋交際費</p>
  <canvas id="playChart"></canvas>
</section>

<script>
const labels = {{ labels|tojson }};
const categoryValues = {{ category_values|tojson }};
const playValues = {{ play_values|tojson }};

const yen = value => "¥" + value.toLocaleString();

new Chart(document.getElementById("categoryChart"), {
  type: "bar",
  data: {
    labels: labels,
    datasets: [{
      label: "{{ selected_category }}",
      data: categoryValues
    }]
  },
  options: {
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: context => yen(context.raw)
        }
      }
    },
    scales: {
      y: {
        ticks: {
          callback: value => yen(value)
        }
      }
    }
  }
});

new Chart(document.getElementById("playChart"), {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "遊び費",
      data: playValues,
      tension: 0.35
    }]
  },
  options: {
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: context => yen(context.raw)
        }
      }
    },
    scales: {
      y: {
        ticks: {
          callback: value => yen(value)
        }
      }
    }
  }
});
</script>

{% endblock %}
