{% extends "base.html" %}

{% block content %}

<section class="big-card">
  <h1>月別比較</h1>

  <form method="get" class="form">

    <label>表示モード</label>
    <select class="input" name="mode">
      <option value="category" {% if mode == "category" %}selected{% endif %}>カテゴリ別</option>
      <option value="play" {% if mode == "play" %}selected{% endif %}>遊び費グループ</option>
    </select>

    <label>カテゴリ</label>
    <select class="input" name="category">
      {% for c in categories %}
        <option value="{{ c }}" {% if c == selected_category %}selected{% endif %}>{{ c }}</option>
      {% endfor %}
    </select>

    <button class="primary-btn">表示する</button>
  </form>
</section>

<section class="card">
  <h2>
    {% if mode == "play" %}
      遊び費グループ推移
    {% else %}
      {{ selected_category }} 推移
    {% endif %}
  </h2>

  <canvas id="barChart"></canvas>
</section>

<script>
const labels = {{ labels|tojson }};
const values = {{ values|tojson }};

new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: labels,
    datasets: [{
      label: "支出額",
      data: values
    }]
  },
  options: {
    plugins: {
      legend: {
        display: false
      },
      tooltip: {
        callbacks: {
          label: function(context) {
            return `¥${context.raw.toLocaleString()}`;
          }
        }
      }
    },
    scales: {
      y: {
        ticks: {
          callback: function(value) {
            return "¥" + value.toLocaleString();
          }
        }
      }
    }
  }
});
</script>

{% endblock %}
